<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff"/>
      <stop offset="100%" style="stop-color:#0099ff"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e0e0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00d9ff" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded rectangle -->
  <rect x="16" y="16" width="224" height="224" rx="48" ry="48" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Decorative corner accent -->
  <path d="M64 16 L192 16 A48 48 0 0 1 240 64 L240 64 L64 64 Z" fill="url(#accentGrad)" opacity="0.15"/>

  <!-- Document icon base -->
  <g transform="translate(60, 45)">
    <!-- Main document shape -->
    <path d="M0 10 L0 160 Q0 170 10 170 L126 170 Q136 170 136 160 L136 50 L96 10 Z"
          fill="#2a2a4a" stroke="url(#accentGrad)" stroke-width="3" filter="url(#glow)"/>

    <!-- Folded corner -->
    <path d="M96 10 L96 50 L136 50 Z" fill="#1a1a3a" stroke="url(#accentGrad)" stroke-width="2"/>

    <!-- OCR scan lines -->
    <g opacity="0.6">
      <rect x="20" y="55" width="96" height="4" rx="2" fill="url(#accentGrad)"/>
      <rect x="20" y="70" width="80" height="4" rx="2" fill="url(#accentGrad)"/>
      <rect x="20" y="85" width="60" height="4" rx="2" fill="url(#accentGrad)"/>
    </g>

    <!-- Data extraction visual -->
    <g transform="translate(20, 105)">
      <rect x="0" y="0" width="30" height="20" rx="4" fill="#00d9ff" opacity="0.8"/>
      <rect x="35" y="0" width="50" height="20" rx="4" fill="#00d9ff" opacity="0.4"/>
      <rect x="90" y="0" width="26" height="20" rx="4" fill="#00d9ff" opacity="0.6"/>

      <rect x="0" y="28" width="40" height="16" rx="3" fill="#ff6b6b" opacity="0.7"/>
      <rect x="45" y="28" width="35" height="16" rx="3" fill="#4ecdc4" opacity="0.7"/>
      <rect x="85" y="28" width="31" height="16" rx="3" fill="#ffe66d" opacity="0.7"/>
    </g>
  </g>

  <!-- Magnifying glass (OCR symbol) -->
  <g transform="translate(165, 155)">
    <circle cx="25" cy="25" r="30" fill="none" stroke="url(#accentGrad)" stroke-width="6" opacity="0.9"/>
    <line x1="45" y1="45" x2="70" y2="70" stroke="url(#accentGrad)" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  </g>
</svg>
